    <style>
        /* Đảm bảo tuyệt đối mọi thành phần đều vuông vức */
        * {
            border-radius: 0 !important;
        }

        body {
            background-color: #f0f4f8;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Hiệu ứng nảy nhẹ ngộ nghĩnh */
        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.95);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Bóng đổ viền đen sắc nét đặc trưng của Neubrutalism */
        .brutal-shadow {
            box-shadow: 6px 6px 0px 0px rgba(0, 0, 0, 1);
        }

        .brutal-shadow-sm {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
        }

        .brutal-hover:hover:not(.disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px rgba(0, 0, 0, 1);
        }

        .brutal-active:active:not(.disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1);
        }
    </style>

        let score = 0;

            for (let i = quizData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
        }

            if (showResult) {
                renderResult();
            } else {
                renderQuiz();
            }
        }

        function renderQuiz() {
            const q = quizData[currentQuestion];

            // Xây dựng các thẻ đáp án
            const optionsHtml = q.options.map((opt, index) => {
                let bgColor = "bg-white";
                let textColor = "text-gray-800";
                let borderStyle = "border-2 border-black";
                let cursorStyle = isCurrentAnswered ? "cursor-default disabled" : "cursor-pointer brutal-hover brutal-active";

                // Nếu đã chọn đáp án thì mới đổi màu
                if (isCurrentAnswered) {
                    if (index === q.correct) {
                        // Thẻ đúng luôn sáng xanh
                        bgColor = "bg-green-400";
                        textColor = "text-black font-bold";
                    } else if (index === selectedAnswers[currentQuestion]) {
                        // Thẻ chọn sai sẽ sáng đỏ
                        bgColor = "bg-red-400";
                        textColor = "text-white font-bold";
                    } else {
                        // Các thẻ không liên quan mờ đi
                        bgColor = "bg-gray-100 opacity-50";
                    }

                return `
                    <div class="${bgColor} ${textColor} ${borderStyle} ${cursorStyle} brutal-shadow-sm p-4 transition-all duration-200 pop-in"

            </button>`

        ${isLast

                class="bg-yellow-400 text-black font-bold border-2 border-black brutal-shadow-sm brutal-hover brutal-active px-8 py-3">
                Xem Điểm

                Next
            </button>`

`;

                    </div>

                    <div class="bg-[#ff90e8] border-4 border-black p-6 md:p-8 mb-8 brutal-shadow pop-in">

                    </div>

                    <div class="flex flex-col space-y-4 mb-8">
                        ${optionsHtml}
                    </div>

                    <div class="flex justify-end h-16 items-center">
                        ${actionBtnHtml}
                    </div>
                </div>
            `;
        }

        function renderResult() {
            appElement.innerHTML = `
                <div class="bg-white border-4 border-black p-8 brutal-shadow text-center pop-in">

                    <button onclick="resetQuiz()" class="bg-[#ff90e8] text-black font-bold border-2 border-black brutal-shadow-sm brutal-hover brutal-active px-8 py-4 text-xl uppercase tracking-wider">
                        Ôn Tập Lại ↻
                    </button>
                </div>
            `;

        //     if (isCurrentAnswered) return;

        //     selectedAnswers[currentQuestion] = index;

        //     // Tính điểm nếu đúng
        //     if (index === quizData[currentQuestion].correct) {
        //         score++;
        //     }

        //     render();

        window.selectOption = function (index) {
            const oldAnswer = selectedAnswers[currentQuestion];

            if (oldAnswer !== null) {
                if (oldAnswer === quizData[currentQuestion].correct) {
                    score--;
                }
            }

            selectedAnswers[currentQuestion] = index;

            if (index === quizData[currentQuestion].correct) {
                score++;
            }

            isCurrentAnswered = true;

            render();
        };




        window.goBack = function () {
            // if (currentQuestion > 0) {
            //     currentQuestion--;

            //     // Nếu câu trước đã trả lời thì giữ trạng thái
            //     isCurrentAnswered =
            //         selectedAnswers[currentQuestion] !== null;

            //     render();
            // }

            if (currentQuestion > 0) {
                currentQuestion--;

                isCurrentAnswered =
                    selectedAnswers[currentQuestion] !== null;

                render();
            }
        };

        window.goNext = function () {
            // if (currentQuestion < quizData.length - 1) {
            //     currentQuestion++;
            //     isCurrentAnswered = false; // Reset trạng thái cho câu mới
            //     render();
            // }
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;

                isCurrentAnswered =
                    selectedAnswers[currentQuestion] !== null;

                render();
            }
        };

        window.submitQuiz = function () {
            showResult = true;
            render();
        };

        window.resetQuiz = function () {
            shuffleQuestions(); // Random lại câu hỏi

            currentQuestion = 0;
            selectedAnswers = Array(quizData.length).fill(null);
            isCurrentAnswered = false;
            showResult = false;
            score = 0;

            render();
        };
        shuffleQuestions();
        render();
    </script>
